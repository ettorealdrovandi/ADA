title: ADA — Accessible Documents from LaTeX
description: Experiments in producing accessible PDF and HTML output from LaTeX sources.

theme: just-the-docs

plugins:
  - jekyll-seo-tag

# Just-the-Docs settings
search_enabled: true
heading_anchors: true
color_scheme: light

aux_links:
  "GitHub repository":
    - "https://github.com/ettorealdrovandi/ADA"

# Math support
mathjax: true

# Standard Jekyll
markdown: kramdown
kramdown:
  math_engine: mathjax

# baseurl/url are intentionally omitted here. The GitHub Actions workflow
# (.github/workflows/pages.yml) injects --baseurl at build time from
# actions/configure-pages, so the same _config.yml works locally (root path)
# and in production (/ADA path).
