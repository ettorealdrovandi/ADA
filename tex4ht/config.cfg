% config.cfg — tex4ht configuration for accessible HTML5 output
\Preamble{html5}

% ── Link our custom stylesheet ──
\Configure{AddCss}{style.css}

% ── Wrap theorem environments with specific class names ──
\ConfigureEnv{theorem}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<div class="newtheorem theorem">}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</div>}\ShowPar}{}{}

\ConfigureEnv{definition}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<div class="newtheorem definition">}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</div>}\ShowPar}{}{}

\ConfigureEnv{corollary}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<div class="newtheorem corollary">}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</div>}\ShowPar}{}{}

\begin{document}
\EndPreamble
